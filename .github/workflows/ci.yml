name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen || uv sync
      - name: Run tests
        run: uv run pytest -q
